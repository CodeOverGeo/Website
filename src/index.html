<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Giovanni Rufino | Portfolio IDE</title>
  <base href="/">
  <meta name="description" content="Angular portfolio SPA styled like a polished IDE and terminal experience.">
  <meta name="theme-color" content="#0D1117">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
  <app-root></app-root>

  <!-- Cal.com floating button -->
  <script>
    (function (C, A, L) {
      let p = function (a, ar) { a.q.push(ar); };
      let d = C.document;
      C.Cal = C.Cal || function () {
        let cal = C.Cal;
        let ar = arguments;
        if (!cal.loaded) {
          cal.ns = {};
          cal.q = cal.q || [];
          d.head.appendChild(d.createElement("script")).src = A;
          cal.loaded = true;
        }
        if (ar[0] === L) {
          const api = function () { p(api, arguments); };
          const namespace = ar[1];
          api.q = api.q || [];
          if (typeof namespace === "string") {
            cal.ns[namespace] = cal.ns[namespace] || api;
            p(cal.ns[namespace], ar);
            p(cal, ["-", namespace, api]);
          } else {
            p(cal, ar);
          }
          return;
        }
        p(cal, ar);
      };
    })(window, "https://app.cal.com/embed/embed.js", "init");
    Cal("init", "giovanni-rufino", { origin: "https://cal.com" });
    Cal.ns["giovanni-rufino"]("floatingButton", {
      calLink: "giovanni-rufino",
      config: { layout: "month_view" },
      buttonText: "Book a Session",
    });
    Cal.ns["giovanni-rufino"]("ui", {
      hideEventTypeDetails: false,
      layout: "month_view",
    });
  </script>
</body>
</html>
